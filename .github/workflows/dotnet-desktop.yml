name: Build and Publish

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Release]

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Read version from csproj
      id: get_version
      shell: pwsh
      run: |
        $xml = [Xml]::new()
        $xml.Load('src/DeepSeekCreditCheck.UI/DeepSeekCreditCheck.UI.csproj')
        $v = $xml.Project.PropertyGroup.Version
        if (-not $v) { $v = '0.0.0' }
        echo "version=$v" >> $env:GITHUB_OUTPUT

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration ${{ matrix.configuration }} --no-restore

    - name: Run tests
      run: dotnet test --configuration ${{ matrix.configuration }} --no-build --verbosity normal

    - name: Publish
      run: |
        dotnet publish src/DeepSeekCreditCheck.UI/DeepSeekCreditCheck.UI.csproj `
          --configuration ${{ matrix.configuration }} `
          --runtime win-x64 `
          --self-contained false `
          --output publish/

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: DeepSeekCreditCheck-v${{ steps.get_version.outputs.version }}
        path: publish/
