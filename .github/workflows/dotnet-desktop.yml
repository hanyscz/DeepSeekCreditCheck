name: Build, Publish and Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Read version from csproj
      id: get_version
      shell: pwsh
      run: |
        $xml = [Xml]::new()
        $xml.Load('src/DeepSeekCreditCheck.UI/DeepSeekCreditCheck.UI.csproj')
        $v = $xml.Project.PropertyGroup.Version
        if (-not $v) { $v = '0.0.0' }
        echo "version=$v" >> $env:GITHUB_OUTPUT

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Run tests
      run: dotnet test --configuration Release --no-build --verbosity normal

    - name: Publish
      shell: pwsh
      run: |
        dotnet publish src/DeepSeekCreditCheck.UI/DeepSeekCreditCheck.UI.csproj `
          --configuration Release `
          --runtime win-x64 `
          --self-contained false `
          --output publish/

    - name: Create release zip
      shell: pwsh
      run: |
        Compress-Archive -Path publish/* -DestinationPath DeepSeekCreditCheck-v${{ steps.get_version.outputs.version }}.zip

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: DeepSeekCreditCheck-v${{ steps.get_version.outputs.version }}
        path: publish/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.get_version.outputs.version }}
        files: DeepSeekCreditCheck-v${{ steps.get_version.outputs.version }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
